<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input Nilai Siswa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-size:20px;
}


body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:#eef2f7;
    color:#333;
}

.header{
    background:linear-gradient(135deg,#198754,#157347);
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:600;
    letter-spacing:1px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.container{
    max-width:1300px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

select,
input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #d6dce5;
    border-radius:10px;
    font-size:14px;
}

select:focus,
input:focus{
    outline:none;
    border-color:#198754;
    box-shadow:0 0 0 3px rgba(25,135,84,.15);
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-save{
    background:#198754;
}

.btn-clear{
    background:#dc3545;
}

.btn-download{
    background:#0d6efd;
}

.table-container{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
    position:sticky;
    top:0;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f9fa;
}

tr:hover{
    background:#e9f2ff;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.stat-card h2{
    font-size:34px;
    color:#198754;
}

.stat-card p{
    color:#666;
}

.kelas-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
    gap:8px;
    margin-top:15px;
}

.kelas-box label{
    background:#f8f9fa;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
}

#rekap{
    margin-top:20px;
}

.footer{
    padding:20px;
    text-align:center;
    color:#777;
    font-size:13px;
}

@media(max-width:768px){

    .header{
        font-size:20px;
    }

}

</style>
</head>

<body>

<div class="header">INPUT NILAI SISWA</div>

<div class="container">

<div class="stats">

    <div class="stat-card">
        <h2 id="totalSiswa">0</h2>
        <p>Jumlah Siswa</p>
    </div>

    <div class="stat-card">
        <h2 id="rataKelas">0</h2>
        <p>Rata-rata Kelas</p>
    </div>

    <div class="stat-card">
        <h2 id="jmlTuntas">0</h2>
        <p>Tuntas</p>
    </div>

    <div class="stat-card">
        <h2 id="jmlTidak">0</h2>
        <p>Belum Tuntas</p>
    </div>

</div>

<!-- ===== FORM ===== -->
<div class="card">

<select id="kelas" onchange="render()">
<option>7A</option><option>7B</option><option>7C</option>
<option>7D</option><option>7E</option><option>7F</option>
<option>7G</option><option>7H</option><option>7I</option>
</select>

<input id="pertemuan" type="number" min="1" max="30" value="1" oninput="render()">

<input id="kkmKelas" type="number" placeholder="KKM Kelas">

<div style="display:flex;gap:5px;">
<input id="search" placeholder="Cari nama siswa..." style="flex:1;">
<button onclick="render()">Search</button>
<button onclick="resetSearch()" style="background:#dc3545;">Reset</button>
</div>

<button class="btn-save" onclick="save()">Simpan</button>
<button class="btn-clear" onclick="clearData()">Bersihkan</button>

<!-- Download multi kelas -->
<div class="kelas-box">
<label><input type="checkbox" value="7A" class="kelasDownload">7A</label>
<label><input type="checkbox" value="7B" class="kelasDownload">7B</label>
<label><input type="checkbox" value="7C" class="kelasDownload">7C</label>
<label><input type="checkbox" value="7D" class="kelasDownload">7D</label>
<label><input type="checkbox" value="7E" class="kelasDownload">7E</label>
<label><input type="checkbox" value="7F" class="kelasDownload">7F</label>
<label><input type="checkbox" value="7G" class="kelasDownload">7G</label>
<label><input type="checkbox" value="7H" class="kelasDownload">7H</label>
<label><input type="checkbox" value="7I" class="kelasDownload">7I</label>
</div>

<button class="btn-download" onclick="downloadCSV()">Download</button>

</div>

<!-- ===== TABEL ===== -->
<div class="card">

<div class="table-container">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Nilai</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="rekap"></div>

</div>

</div>

<script>

// ===== DATA =====
let dataSiswa = [

{kelas:"7A",no:1,nama:"Andi",nilai:{}},
{kelas:"7A",no:2,nama:"Budi",nilai:{}},
{kelas:"7A",no:3,nama:"Citra",nilai:{}},

{kelas:"7B",no:1,nama:"Dedi",nilai:{}},
{kelas:"7B",no:2,nama:"Eka",nilai:{}},
{kelas:"7B",no:3,nama:"Fajar",nilai:{}},

{kelas:"7C",no:1,nama:"Gita",nilai:{}},
{kelas:"7C",no:2,nama:"Hadi",nilai:{}},
{kelas:"7C",no:3,nama:"Indah",nilai:{}},

{kelas:"7D",no:1,nama:"Joko",nilai:{}},
{kelas:"7D",no:2,nama:"Kiki",nilai:{}},
{kelas:"7D",no:3,nama:"Lina",nilai:{}},

{kelas:"7E",no:1,nama:"Maya",nilai:{}},
{kelas:"7E",no:2,nama:"Nanda",nilai:{}},
{kelas:"7E",no:3,nama:"Oki",nilai:{}},

{kelas:"7F",no:1,nama:"Putri",nilai:{}},
{kelas:"7F",no:2,nama:"Rian",nilai:{}},
{kelas:"7F",no:3,nama:"Siti",nilai:{}},

{kelas:"7G",no:1,nama:"Tono",nilai:{}},
{kelas:"7G",no:2,nama:"Umi",nilai:{}},
{kelas:"7G",no:3,nama:"Vina",nilai:{}},

{kelas:"7H",no:1,nama:"Wahyu",nilai:{}},
{kelas:"7H",no:2,nama:"Yani",nilai:{}},
{kelas:"7H",no:3,nama:"Zaki",nilai:{}},

{kelas:"7I",no:1,nama:"Alya",nilai:{}},
{kelas:"7I",no:2,nama:"Bagas",nilai:{}},
{kelas:"7I",no:3,nama:"Cindy",nilai:{}}

];

let dataKKM = {};

// ===== STORAGE =====
function save(){

    localStorage.setItem(
        "nilai",
        JSON.stringify(dataSiswa)
    );

    localStorage.setItem(
        "kkm",
        JSON.stringify(dataKKM)
    );

    render(); // langsung refresh tabel & rekap

    alert("Data tersimpan ✅");
}

function load(){
const d = localStorage.getItem("nilai");
const k = localStorage.getItem("kkm");
if(d) dataSiswa = JSON.parse(d);
if(k) dataKKM = JSON.parse(k);
}

// ===== CLEAR =====
function clearData(){
if(confirm("Hapus semua data?")){
dataSiswa.forEach(d => d.nilai = {});
dataKKM = {};
save();
render();
}
}

// ===== SEARCH =====
function resetSearch(){
document.getElementById("search").value = "";
render();
}

// ===== RENDER =====
function render(){

const k = kelas.value;
const p = pertemuan.value;
const key = document.getElementById("search").value.toLowerCase();

kkmKelas.value = dataKKM[k] || "";

let html = "";

dataSiswa.forEach((d,i)=>{
if(d.kelas === k && d.nama.toLowerCase().includes(key)){

const val = d.nilai[p] || "";

html += `
<tr>
<td>${d.no}</td>
<td>${d.nama}</td>
<td>
<input type="number" value="${val}" 
onchange="setNilai(${i},this.value)">
</td>
</tr>`;
}
});

document.getElementById("tbody").innerHTML = html;

buatRekap(k);
}

// ===== INPUT NILAI =====
function setNilai(i,val){
dataSiswa[i].nilai[pertemuan.value] = val;
localStorage.setItem("nilai", JSON.stringify(dataSiswa));
}

// ===== SET KKM =====
kkmKelas.onchange = function(){
dataKKM[kelas.value] = parseInt(this.value || 0);
save();
render();
};

// ===== REKAP =====
function buatRekap(k){

const KKM = dataKKM[k] || 0;

let data = dataSiswa
.filter(d => d.kelas === k)
.map(d => {

let total=0, count=0;

for(let i=1;i<=30;i++){
let n = d.nilai[i];
if(n){ total += parseInt(n); count++; }
}

let rata = count ? (total/count).toFixed(1) : 0;
let status = rata >= KKM ? "Tuntas" : "Tidak";

return {...d, rata:parseFloat(rata), status};

});

// sort + rank
data.sort((a,b)=>b.rata-a.rata);

let totalNilai = 0;
let jumlahData = data.length;
let tuntas = 0;
let tidak = 0;

data.forEach(d=>{

    totalNilai += d.rata;

    if(d.status=="Tuntas"){
        tuntas++;
    }else{
        tidak++;
    }

});

let rataKelas =
jumlahData ?
(totalNilai/jumlahData).toFixed(1) : 0;

document.getElementById("totalSiswa").innerText =
jumlahData;

document.getElementById("rataKelas").innerText =
rataKelas;

document.getElementById("jmlTuntas").innerText =
tuntas;

document.getElementById("jmlTidak").innerText =
tidak;

let rank=1;
data.forEach((d,i)=>{
if(i>0 && d.rata < data[i-1].rata) rank++;
d.rank = rank;
});

// tampil
let html = "<br><b>Rekap Nilai</b><div class='table-container'><table><tr>";
html += "<th>No</th><th>Nama</th>";

for(let i=1;i<=30;i++) html += "<th>"+i+"</th>";

html += "<th>Rata</th><th>Status</th><th>Rank</th></tr>";

data.forEach(d=>{

const warna = d.status === "Tuntas" ? "green" : "red";

html += `<tr>
<td>${d.no}</td>
<td>${d.nama}</td>`;

for(let i=1;i<=30;i++){
html += `<td>${d.nilai[i] || ""}</td>`;
}

html += `
<td>${d.rata}</td>
<td style="color:${warna}">${d.status}</td>
<td>${d.rank}</td>
</tr>`;
});

html += "</table></div>";

document.getElementById("rekap").innerHTML = html;
}

// ===== DOWNLOAD ANDROID =====
function downloadCSV(){

let kelasDipilih = [];

document.querySelectorAll(".kelasDownload:checked")
.forEach(cb => kelasDipilih.push(cb.value));

if(kelasDipilih.length === 0){
alert("Pilih kelas!");
return;
}

let csv = "";

kelasDipilih.forEach(k => {

const KKM = dataKKM[k] || 0;

csv += "KELAS " + k + "\n";
csv += "NO;NAMA;";

for(let i=1;i<=30;i++) csv += i + ";";

csv += "RATA;STATUS;RANK\n";

let data = dataSiswa
.filter(d => d.kelas === k)
.map(d => {

let total=0, count=0;

for(let i=1;i<=30;i++){
let n = d.nilai[i];
if(n){ total += parseInt(n); count++; }
}

let rata = count ? (total/count).toFixed(1) : 0;
let status = rata >= KKM ? "Tuntas" : "Tidak";

return {...d, rata:parseFloat(rata), status};

});

data.sort((a,b)=>b.rata-a.rata);

let rank=1;
data.forEach((d,i)=>{
if(i>0 && d.rata < data[i-1].rata) rank++;
d.rank=rank;
});

data.forEach(d=>{
let row = `${d.no};${d.nama};`;
for(let i=1;i<=30;i++){
row += (d.nilai[i] || "") + ";";
}
row += `${d.rata};${d.status};${d.rank}`;
csv += row + "\n";
});

csv += "\n\n";

});

Android.downloadCSV(csv);
}

// ===== INIT =====
window.onload = function(){
load();
render();
};

</script>
<div class="footer">
© 2026 Sistem Pengolahan Nilai Peserta Didik
</div>
</body>
</html>
